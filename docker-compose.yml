services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - CORS_ORIGINS=http://localhost:5173,http://localhost:3000
      - RATE_LIMIT_RPM=60
      - USE_OLLAMA_MEDGEMMA=true
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - db-data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  ollama-models:
